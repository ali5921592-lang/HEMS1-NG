<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nurse Guide Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --blue-900:#0B2A66; --blue-700:#1657CF; --blue-500:#3B7DFF; --blue-100:#E8F0FE;
    --red:#D92D20; --red-bg:#FDECEA;
    --amber:#B25E00; --amber-bg:#FEF3E2;
    --green:#0E8A4B; --green-bg:#E7F8EF;
    --ink:#141B2B; --ink-2:#4A5468; --line:#E4E9F2;
    --surface:#FFFFFF; --bg:#F5F8FE;
  }
  [data-theme="dark"]{
    --blue-900:#9DC1FF; --blue-700:#6EA0FF; --blue-500:#3B7DFF; --blue-100:#152A52;
    --red:#FF8A80; --red-bg:#3A1717;
    --amber:#FFC069; --amber-bg:#3A2C10;
    --green:#7BE5B0; --green-bg:#0F2E20;
    --ink:#EAF0FB; --ink-2:#AAB6CC; --line:#26324A;
    --surface:#101A2E; --bg:#0A1220;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.brand,.nav-label{font-family:'Manrope',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:76px;background:var(--bg);}

  .topbar{position:sticky;top:0;z-index:30;background:var(--surface);border-bottom:1px solid var(--line);padding:10px 14px 10px;}
  .topbar-row{display:flex;align-items:center;gap:10px;}
  .brand{font-weight:800;font-size:15px;color:var(--blue-900);flex:1;display:flex;align-items:center;gap:8px;}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--blue-500);}
  .icon-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
  .searchwrap{margin-top:8px;position:relative;}
  .searchbox{width:100%;padding:11px 14px 11px 38px;border-radius:12px;border:1.5px solid var(--line);background:var(--bg);font-size:14px;color:var(--ink);outline:none;}
  .searchbox:focus{border-color:var(--blue-500);}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5;font-size:14px;}
  .search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--line);border-radius:14px;max-height:60vh;overflow-y:auto;box-shadow:0 12px 30px rgba(10,20,40,.18);z-index:40;}
  .search-item{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:flex-start;cursor:pointer;}
  .search-item:last-child{border-bottom:none;}
  .search-item:hover{background:var(--bg);}
  .search-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;white-space:nowrap;margin-top:2px;}
  .search-title{font-size:13.5px;font-weight:600;}
  .search-sub{font-size:11.5px;color:var(--ink-2);margin-top:1px;}
  .search-empty{padding:16px;text-align:center;color:var(--ink-2);font-size:13px;}

  .content{padding:14px 14px 20px;}
  .disclaimer{background:var(--amber-bg);border:1px solid var(--amber);color:var(--amber);border-radius:12px;padding:10px 12px;font-size:11.5px;line-height:1.5;margin-bottom:14px;font-weight:500;}

  .section-title{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-2);font-weight:700;margin:18px 0 8px;}
  .section-title:first-child{margin-top:0;}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .clinic-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;cursor:pointer;position:relative;transition:transform .12s ease;}
  .clinic-card:active{transform:scale(.97);}
  .clinic-card .em{font-size:22px;}
  .clinic-card .t{font-weight:700;font-size:13px;margin-top:6px;line-height:1.25;}
  .clinic-card .badge{position:absolute;top:10px;right:10px;font-size:9px;background:var(--blue-100);color:var(--blue-700);padding:2px 6px;border-radius:6px;font-weight:700;}
  .clinic-card.locked{opacity:.55;}
  .clinic-card.locked .t{color:var(--ink-2);}

  .card{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--blue-500);border-radius:12px;padding:12px 13px;margin-bottom:10px;}
  .card.red{border-left-color:var(--red);}
  .card.amber{border-left-color:var(--amber);}
  .card.green{border-left-color:var(--green);}
  .card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;cursor:pointer;}
  .card-title{font-weight:700;font-size:14px;}
  .card-sub{font-size:11.5px;color:var(--ink-2);margin-top:2px;}
  .fav-btn{background:none;border:none;font-size:17px;cursor:pointer;color:var(--ink-2);line-height:1;padding:2px;}
  .fav-btn.active{color:var(--red);}
  .card-body{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);display:none;}
  .card-body.open{display:block;}
  .field{margin-bottom:8px;}
  .field-label{font-size:10.5px;font-weight:700;color:var(--blue-700);text-transform:uppercase;letter-spacing:.04em;}
  .field-val{font-size:13px;line-height:1.5;margin-top:2px;}
  .field-val.mono{font-size:13px;}
  .tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;}
  .tag.risk{background:var(--red-bg);color:var(--red);}
  .tag.lasa{background:var(--amber-bg);color:var(--amber);}
  .tag.route{background:var(--blue-100);color:var(--blue-700);}

  .backbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .backbar .icon-btn{width:32px;height:32px;}
  .backbar h1{font-size:16px;margin:0;font-weight:800;}

  .subnav{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;}
  .subnav::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;padding:7px 13px;border-radius:20px;background:var(--surface);border:1px solid var(--line);font-size:12.5px;font-weight:600;color:var(--ink-2);cursor:pointer;white-space:nowrap;}
  .chip.active{background:var(--blue-700);border-color:var(--blue-700);color:#fff;}

  .list-row{display:flex;justify-content:space-between;align-items:center;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
  .list-row:last-child{border-bottom:none;}
  .list-row .name{font-size:13.5px;font-weight:600;}
  .list-row .val{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--blue-700);font-weight:600;}

  .calc-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;}
  .calc-title{font-weight:700;font-size:13.5px;margin-bottom:10px;}
  .calc-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
  .calc-row label{font-size:12px;color:var(--ink-2);flex:1;}

  .note-item .meta{font-size:10.5px;color:var(--ink-2);margin-top:6px;display:flex;justify-content:space-between;}
  .del-link{color:var(--red);cursor:pointer;font-weight:600;}
  .empty-state{text-align:center;padding:40px 10px;color:var(--ink-2);font-size:13px;}
  .empty-state .em{font-size:30px;margin-bottom:8px;}

  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--ink-2);font-size:9.5px;font-weight:700;padding:6px 2px;cursor:pointer;}

  .nav-btn.active{color:var(--blue-700);}
  .pdf-note{font-size:11px;color:var(--ink-2);text-align:center;margin-top:10px;}

  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
  .cal-weekday{text-align:center;font-size:10px;font-weight:700;color:var(--ink-2);padding-bottom:4px;}
  .cal-day{aspect-ratio:1;border-radius:8px;border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--surface);}
  .cal-day.empty{border:none;cursor:default;background:transparent;}
  .cal-day.selected{outline:2px solid var(--blue-700);outline-offset:1px;}
  .cal-daynum{font-size:12px;font-weight:600;}
  .cal-shift-label{font-size:8px;font-weight:700;margin-top:1px;}
  .cal-day.shift-0816{background:var(--blue-100);color:var(--blue-700);}
  .cal-day.shift-0817{background:var(--green-bg);color:var(--green);}
  .cal-day.shift-1608{background:var(--amber-bg);color:var(--amber);}
  .cal-day.shift-0808{background:var(--red-bg);color:var(--red);}

  .shift-btn{flex:1 1 40%;min-width:80px;padding:10px 8px;border-radius:10px;border:1px solid var(--line);text-align:center;font-size:12px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--ink);}
  .shift-btn.shift-0816{background:var(--blue-100);color:var(--blue-700);border-color:transparent;}
  .shift-btn.shift-0817{background:var(--green-bg);color:var(--green);border-color:transparent;}
  .shift-btn.shift-1608{background:var(--amber-bg);color:var(--amber);border-color:transparent;}
  .shift-btn.shift-0808{background:var(--red-bg);color:var(--red);border-color:transparent;}

  .shift-dot.shift-0816{background:var(--blue-700);}

  .shift-dot.shift-1608{background:var(--amber);}
  .shift-dot.shift-0808{background:var(--red);}

  .med-row:last-child{border-bottom:none;}

  .med-row .mgeneric{font-size:11.5px;color:var(--ink-2);margin-top:1px;}
  .med-alpha{font-size:11px;font-weight:800;color:var(--blue-700);background:var(--blue-100);border-radius:6px;padding:2px 8px;display:inline-block;margin:10px 0 4px;}

  .med-badge.risk{background:var(--red-bg);color:var(--red);}
  .med-badge.lasa{background:var(--amber-bg);color:var(--amber);}
  .sev-badge{font-size:11px;font-weight:800;padding:5px 10px;border-radius:8px;display:inline-block;}
  .sev-green{background:var(--green-bg);color:var(--green);}
  .sev-yellow{background:#FEF9E2;color:#8A6D00;}

  .sev-orange{background:var(--amber-bg);color:var(--amber);}
  .sev-red{background:var(--red-bg);color:var(--red);}
  .med-select-chip{padding:8px 12px;border-radius:20px;border:1.5px solid var(--line);font-size:12.5px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--ink);display:inline-flex;align-items:center;gap:6px;}
  .med-select-chip.picked{background:var(--blue-700);border-color:var(--blue-700);color:#fff;}
  .med-picked-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .note-textarea{width:100%;min-height:60px;border-radius:10px;border:1px solid var(--line);padding:9px;font-size:12.5px;background:var(--bg);color:var(--ink);resize:vertical;font-family:'Inter',sans-serif;margin-top:8px;}

  .ecg-strip{width:100%;height:70px;background:#0B1A0F;border-radius:8px;margin:8px 0;}
  [data-theme="dark"] .ecg-strip{background:#050D08;}
  .ecg-strip path{fill:none;stroke:#39FF6A;stroke-width:2;}
  .ecg-cat{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--blue-100);color:var(--blue-700);display:inline-block;margin-bottom:6px;}
  .abg-result{background:var(--blue-100);border-radius:12px;padding:14px;margin-top:10px;}
  .abg-result .abg-main{font-size:15px;font-weight:800;color:var(--blue-700);margin-bottom:6px;}
  .abg-result .abg-line{font-size:12.5px;color:var(--ink);margin-bottom:3px;}
  .notif-banner{background:var(--red-bg);border:1px solid var(--red);color:var(--red);border-radius:12px;padding:10px 12px;font-size:12.5px;line-height:1.5;margin-bottom:12px;font-weight:600;}
</style>

<!-- ============================================================
     EARLY MOBILE POLYFILL (must run BEFORE the main app script)
     -----------------------------------------------------------
     The main app synchronously calls loadPersisted() on startup,
     which reads window.storage immediately. If the window.storage
     polyfill were defined in a script block AFTER the main script,
     this first read would always see "no data", making shifts/notes/
     favorites appear reset on every launch. So the polyfill is
     defined here, BEFORE the main app script runs. -->
<script>
(function(){
  'use strict';
  if (typeof window.storage === 'undefined') {
    window.storage = {
      get: function(key){
        return new Promise(function(resolve, reject){
          try {
            var v = window.localStorage.getItem(key);
            if (v === null) { resolve(null); return; }
            resolve({ key: key, value: v, shared: false });
          } catch(e){ reject(e); }
        });
      },
      set: function(key, value){
        return new Promise(function(resolve, reject){
          try {
            window.localStorage.setItem(key, value);
            resolve({ key: key, value: value, shared: false });
          } catch(e){ reject(e); }
        });
      },
      delete: function(key){
        return new Promise(function(resolve, reject){
          try {
            window.localStorage.removeItem(key);
            resolve({ key: key, deleted: true, shared: false });
          } catch(e){ reject(e); }
        });
      },
      list: function(prefix){
        return new Promise(function(resolve, reject){
          try {
            var keys = [];
            for (var i=0; i<window.localStorage.length; i++){
              var k = window.localStorage.key(i);
              if (!prefix || (k && k.indexOf(prefix) === 0)) keys.push(k);
            }
            resolve({ keys: keys, prefix: prefix, shared: false });
          } catch(e){ reject(e); }
        });
      }
    };
  }
})();
</script>

    {title:'General Oral Care (During Infection/Pain)', color:'green', materials:'Soft toothbrush, warm salt water', steps:['Oral hygiene maintained as much as possible despite pain (with soft brush)','Warm salt water rinse recommended','Regularly observe swelling/pain area','Assess oral intake tolerance and nutritional status'], freq:'At least twice daily and after each meal', complications:'Worsening infection due to disrupted oral hygiene', notes:'Soft/liquid diet is recommended in cases of severe pain.'},
  ],
  abbreviations:[{a:'TMJ', full:'Temporomandibular Joint'},{a:'RCT', full:'Root Canal Treatment'},{a:'ANUG', full:'Acute Necrotizing Ulcerative Gingivitis'}],
  protocols:[{title:'Ludwig\'s Angina Emergency Airway Assessment Checklist', items:['Was airway patency continuously monitored?','Was intubation/tracheostomy team notified?','Was IV broad-spectrum antibiotic started?','Was emergency surgical drainage planned?']},
    {title:'Dental Abscess Post-Drainage Monitoring Checklist', items:['Was swelling spread assessed?','Was fever tracked?','Was antibiotic adherence ensured?','Was oral intake tolerance assessed?']}],
  nanda:[{dx:'Risk for Ineffective Airway Clearance', related:'Related to swelling from floor-of-mouth/neck infection', outcome:'Patient shows signs of a patent airway.'},

ems: {
  name:'Emergency Medical Services (EMS/Ambulance)',
  intro:{
    patients:'Patients of all ages presenting in the field (home, workplace, street, traffic accident, disaster site, etc.) with any sudden-onset medical emergency, trauma, obstetric emergency, or psychiatric crisis are assessed. The key difference from the hospital Emergency Department: intervention begins outside the hospital, with limited equipment and personnel, often in an uncontrolled environment.',
    common:['Out-of-Hospital Cardiac Arrest','Traffic Accident/Polytrauma','Acute Coronary Syndrome (Prehospital STEMI)','Acute Stroke (Prehospital)','Respiratory Distress (COPD/Asthma Exacerbation)'],
    role:'The paramedic/EMT is responsible for ensuring scene safety, performing a rapid primary assessment (ABCDE), carrying out life-saving interventions (CPR, airway management, hemorrhage control, IV/IO access), ensuring fast and safe transport to the appropriate hospital/triage category, and coordinating with the dispatch/command center.'
  },
  workflow:{
    morning:['Vehicle and equipment inventory (defibrillator, oxygen tank, drug kit, stretcher)','Functional testing of devices (monitor, glucometer, capnograph)','Shift handover and area/station briefing'],
    noon:['Responding to dispatch calls','Scene safety assessment and incident scene management','Patient assessment, stabilization, and transport decisions'],
    evening:['Completing equipment/medication resupply','Completing case documentation (electronic health record/EMS reporting system)'],
    night:['Continuous case readiness and rest rotation','Post-critical-case team debriefing','Nighttime vehicle/equipment check'],
    handover:['Handover to the Emergency Department in SBAR format: case summary, field interventions performed, vital sign trend, medications and doses given, estimated time of incident']
  },
  admission:{
    steps:['Scene safety assessment (traffic, fire, electrical hazard, violence risk, suspected CBRN)','Donning personal protective equipment (gloves, and eyewear/mask if needed)','Rapid primary assessment: ABCDE (Airway-Breathing-Circulation-Disability-Exposure)','Determining the mechanism of injury (trauma mechanism, symptom onset time)','Determining triage category and transport priority (emergent/routine)','Notifying dispatch and consulting the receiving hospital/specialty (if a STEMI/stroke alert is needed)']
  },
  diseases:[
    {title:'Out-of-Hospital Cardiac Arrest', color:'red', def:'Sudden cardiac arrest occurring outside the hospital, in the field; characterized by absence of pulse and breathing.',
     symptoms:'Unresponsiveness, absent pulse, apnea or agonal breathing.',
     dx:'Clinical assessment (pulse/breathing check ≤10 seconds), rhythm analysis on the monitor (VF/pulseless VT, asystole, PEA).',
     tx:'Immediate high-quality chest compressions (uninterrupted, 100-120/min), early defibrillation (if shockable rhythm), airway management, IV/IO access, and ACLS drug protocol (epinephrine, amiodarone if indicated).',
     nursing:'Continuous monitoring of compression quality (depth, rate, full chest recoil), rotating the compressor every 2 minutes, tracking ETCO2 via capnography (an indicator of compression quality and ROSC), informing and supporting family/bystanders.',
     followup:'If ROSC (return of spontaneous circulation) is achieved, transport to an appropriate facility for post-arrest care (targeted temperature management, 12-lead ECG).',
     complications:'Permanent hypoxic brain injury, death despite resuscitation, rib/sternal fracture (from compressions).'},
    {title:'Prehospital STEMI (ST-Elevation MI)', color:'red', def:'Myocardial infarction due to acute complete occlusion of a coronary artery, detected in the field via 12-lead ECG.',
     symptoms:'Chest pain/pressure (often radiating to the left arm/jaw), diaphoresis, nausea, shortness of breath; may present atypically (silent) in elderly/diabetic patients.',
     dx:'Field 12-lead ECG acquisition and interpretation, pain/symptom history.',
     tx:'Oxygen (if hypoxemic), aspirin (chewed), nitroglycerin (if not hypotensive), morphine for pain; if ECG is consistent with STEMI, notify dispatch/hospital with a "STEMI alert" for direct routing to the cath lab.',
     nursing:'Establishing IV access, continuous monitoring (arrhythmia risk), repeat ECG, early hospital notification to shorten door-to-balloon time, reassuring the patient.',
     followup:'Direct transport to the cath lab or designated STEMI center; the prehospital ECG is transmitted to the hospital team in advance.',
     complications:'Cardiogenic shock, lethal arrhythmia (VF/VT), cardiac arrest.'},
    {title:'Prehospital Acute Stroke', color:'red', def:'A cerebrovascular event recognized in the field by FAST (Face-Arm-Speech-Time) findings, presenting with sudden neurological deficit.',
     symptoms:'Sudden facial asymmetry, unilateral arm/leg weakness, slurred speech, loss of balance, severe headache.',
     dx:'FAST/Cincinnati Prehospital Stroke Scale, blood glucose check (hypoglycemia can mimic stroke), determining the exact symptom onset time (or "last known well" time).',
     tx:'Airway/breathing support, oxygen (if hypoxemic), glucose correction (if hypoglycemic), rapid transport to a designated stroke center with a "stroke alert" notification.',
     nursing:'Clarifying the symptom onset time (critical information for the thrombolytic/thrombectomy window), restricting oral intake (aspiration risk), frequent neurological reassessment, reassuring the patient.',
     followup:'Direct/priority transport to a stroke center; information gathered in the field (time, initial findings) is relayed to the hospital team via SBAR.',
     complications:'Rapid neurological deterioration, loss of airway protection, aspiration.'},
    {title:'Polytrauma / Traffic Accident', color:'red', def:'A life-threatening injury pattern affecting multiple body regions as a result of a traffic accident, fall from height, or blunt/penetrating trauma.',
     symptoms:'Variable; visible deformity/bleeding, hypotension, altered consciousness, respiratory distress, pain.',
     dx:'Field ABCDE primary assessment, evaluation of injury mechanism (suspicion of high-energy trauma), rapid trauma survey.',
     tx:'Hemorrhage control (direct pressure, tourniquet if needed), airway management, cervical spine immobilization (if suspected), IV/IO access and fluid resuscitation, pain management, rapid and safe transport ("scoop and run" principle in severe trauma).',
     nursing:'Correct application of cervical collar and spinal board immobilization, frequent vital sign monitoring, hypothermia prevention (blanket/covering), continuous observation of bleeding sites, pain scoring.',
     followup:'Direct transport to a trauma center (based on mechanism/injury severity); all field findings are relayed in detail to the hospital team.',
     complications:'Hemorrhagic shock, tension pneumothorax, hypothermia-acidosis-coagulopathy triad.'},
    {title:'Extremity Hemorrhage Requiring Tourniquet', color:'red', def:'Serious/life-threatening extremity bleeding that cannot be controlled with direct pressure.',
     symptoms:'Active, pulsatile, or heavy oozing hemorrhage; signs of hypovolemic shock (tachycardia, hypotension, pale/clammy skin).',
     dx:'Visual assessment; failure to respond to direct pressure.',
     tx:'Apply the tourniquet 5-7 cm proximal to the bleeding site, tighten until bleeding completely stops, record the application TIME.',
     nursing:'Always document the tourniquet application time on the tourniquet or on the patient, check distal pulse after bleeding stops, manage pain, monitor the patient for hypovolemic shock.',
     followup:'The tourniquet is NOT released in the field; it is released in a controlled manner by the hospital team; the patient is handed over with the note "tourniquet applied at: ...".',
     complications:'Limb ischemia from prolonged tourniquet time (this risk is smaller than the risk of death from uncontrolled hemorrhage).'},
    {title:'Acute Respiratory Distress (COPD/Asthma Exacerbation)', color:'red', def:'Acute respiratory failure identified in the field due to bronchospasm and/or increased secretions.',
     symptoms:'Wheezing, use of accessory respiratory muscles, breathlessness too severe to speak, cyanosis, low SpO2.',
     dx:'Clinical assessment, SpO2 measurement, lung auscultation, history (known COPD/asthma).',
     tx:'Oxygen support, nebulized bronchodilator (salbutamol ± ipratropium), CPAP if available for severe cases, or airway support; early hospital notification.',
     nursing:'Continuous monitoring of SpO2 and respiratory rate, transporting the patient in an upright position, reassurance (anxiety worsens respiratory distress), readiness for airway intervention if the patient deteriorates.',
     followup:'The patient is handed over to the emergency department with a detailed SBAR (nebulizer given, response).',
     complications:'Respiratory muscle fatigue, respiratory arrest, pneumothorax (in severe cases).'},
    {title:'Anaphylaxis (Field)', color:'red', def:'A sudden-onset, multi-system, potentially life-threatening severe allergic reaction occurring in the field.',
     symptoms:'Urticaria, lip/tongue/throat swelling, wheezing, hypotension, altered consciousness.',
     dx:'Clinical diagnosis (exposure history + sudden multi-system findings).',
     tx:'Immediate IM epinephrine (anterolateral thigh, auto-injector or ampule), oxygen, IV fluid support; repeat epinephrine dose if needed (every 5-15 minutes).',
     nursing:'Continuous airway patency assessment, administering epinephrine WITHOUT DELAY (delayed epinephrine is a leading cause of field deaths), transporting the patient in a supine/semi-upright position as appropriate.',
     followup:'Transport to hospital observation is mandatory due to biphasic reaction risk; the epinephrine dose/time given in the field is reported to the hospital.',
     complications:'Airway obstruction, cardiovascular collapse, biphasic anaphylaxis.'},
    {title:'Hypoglycemia (Field)', color:'amber', def:'A field emergency presenting with altered consciousness related to low blood glucose; can mimic stroke.',
     symptoms:'Diaphoresis, tremor, confusion, agitation, loss of consciousness, seizure (in severe cases).',
     dx:'Rapid glucometer blood glucose check — one of the first assessments that should be performed in ANY patient with altered consciousness.',
     tx:'Oral fast-acting sugar if the patient is conscious; IV 10-30% dextrose or IM/intranasal glucagon if unconscious/unable to swallow.',
     nursing:'Recheck glucose after correction, monitor level of consciousness, ask about the underlying cause (insulin dose, oral antidiabetic, alcohol), check consciousness before oral intake to prevent aspiration.',
     followup:'Hospital evaluation/observation is recommended for sulfonylurea-induced hypoglycemia, as it may recur.',
     complications:'Seizure, aspiration, permanent neurological damage from prolonged hypoglycemia.'},
    {title:'Status Epilepticus (Field)', color:'red', def:'Seizures in the field lasting longer than 5 minutes, or consecutive seizures without full return of consciousness in between.',
     symptoms:'Ongoing tonic-clonic movements, unconsciousness, cyanosis (if prolonged).',
     dx:'Clinical observation (seizure duration and type), blood glucose check (to rule out hypoglycemia).',
     tx:'Airway protection (do not forcibly intervene during the seizure), oxygen, IV/intranasal/buccal benzodiazepine (midazolam) administration.',
     nursing:'Protect the patient from environmental injury, do not place anything in the mouth, record seizure duration, monitor postictal level of consciousness.',
     followup:'Transport for neurology evaluation if the seizure does not stop or the cause is unknown.',
     complications:'Prolonged hypoxia, aspiration, permanent neurological damage (in untreated status epilepticus).'},
    {title:'Opioid Overdose (Field)', color:'red', def:'A field emergency involving respiratory depression and unconsciousness due to opioid intake.',
     symptoms:'Miosis (pinpoint pupils), respiratory depression/apnea, unconsciousness, cyanosis.',
     dx:'Clinical presentation, evidence of drugs/paraphernalia at the scene, witness account.',
     tx:'Airway and ventilatory support (bag-valve-mask), IM/intranasal/IV naloxone administration, repeat dose if needed.',
     nursing:'Continuous monitoring of respiratory rate and SpO2, readiness for sudden agitation/withdrawal signs after naloxone, close monitoring during transport since naloxone\'s effect may be shorter than the opioid\'s (recurrence risk).',
     followup:'Since naloxone\'s effect may wear off before the opioid\'s, the patient requires observation during transport and for several hours in the hospital.',
     complications:'Respiratory arrest, aspiration, hypoxic brain injury, post-naloxone agitation/aggression.'},
    {title:'Prehospital Delivery (Field Birth)', color:'amber', def:'An unexpected delivery occurring in the field or in the ambulance before reaching the hospital.',
     symptoms:'Regular, increasingly frequent contractions, crowning at the vaginal opening, maternal report ("birth is imminent").',
     dx:'Clinical observation (perineal exam to assess imminence of delivery).',
     tx:'If delivery is imminent, assist with the birth in the field using a sterile delivery kit; dry, warm, and stimulate the newborn immediately after birth if needed; stabilize mother and baby and transport together to the hospital.',
     nursing:'Ensure privacy, protect mother and baby from hypothermia, closely monitor for postpartum maternal hemorrhage (uterine atony), save the placenta if delivered and bring it to the hospital.',
     followup:'Mother and newborn are handed over together to the obstetric/newborn team with delivery time and event details.',
     complications:'Postpartum hemorrhage, neonatal hypothermia/asphyxia, shoulder dystocia.'},
    {title:'Agitated/Aggressive Patient (Psychiatric Crisis, Field)', color:'amber', def:'A patient in the field who poses a risk of harm to self or others, exhibiting agitated or aggressive behavior.',
     symptoms:'Agitation, aggression, disconnection from reality, expressions of self-harm/harm to others.',
     dx:'Clinical observation; an effort is always made to rule out an organic cause (hypoglycemia, hypoxia, substance effect).',
     tx:'Priority is team and patient safety; verbal de-escalation techniques, security/police support if needed, sedation with physician authorization only in cases of extreme agitation.',
     nursing:'Maintain a safe distance for yourself and the team, use non-threatening body language, listen to the patient without judgment, physical restraint (if used) is a last resort applied per protocol only.',
     followup:'Transport to an appropriate facility for psychiatric emergency evaluation; behaviors observed in the field and possible triggers are relayed to the hospital team.',
     complications:'Injury to team/patient, patient elopement, deterioration due to inadequate de-escalation.'},
    {title:'Thermal Burn', color:'red', def:'Damage to the skin and/or underlying tissue caused by a heat source (fire, hot liquid, steam, contact); classified by depth (1st/2nd/3rd degree) and surface area.',
     symptoms:'1st degree: redness, pain. 2nd degree: blisters, severe pain, moist appearance. 3rd degree: white/charred, painless (nerve endings damaged) skin.',
     dx:'Visual assessment; estimation of burn depth and total body surface area percentage using the "Rule of Nines".',
     tx:'Remove from the heat source, cool the burned area with cool (not ice-cold) water for 10-20 minutes, cover with a sterile/clean dressing, IV fluid resuscitation and pain management for extensive burns.',
     nursing:'Ice/very cold water is NEVER used (causes additional tissue damage), no adhesive substances/creams are applied, cooling time is limited in extensive burns due to hypothermia risk, early airway assessment is critical if inhalation injury is suspected (facial/eyebrow burns, sooty sputum).',
     followup:'Burns >20% total body surface area, or involving the face/hands/genitals, or with suspected airway involvement, are transported to a burn center.',
     complications:'Hypovolemic shock (fluid loss in extensive burns), airway edema/obstruction, hypothermia, infection.'},
    {title:'Stab Wound / Penetrating Injury', color:'red', def:'Penetrating trauma caused by a sharp/pointed object, carrying a risk of internal organ/vascular injury.',
     symptoms:'Visible wound, active bleeding, findings varying by location (respiratory distress with chest injury, peritoneal signs with abdominal injury).',
     dx:'Visual assessment, ABCDE primary assessment, questioning the mechanism of injury and characteristics of the object (length, estimated depth).',
     tx:'Hemorrhage control with direct pressure, DO NOT REMOVE an impaled object in the field (it may be tamponading the bleeding), stabilize it in place and secure it for transport, IV fluids and rapid transport if signs of shock.',
     nursing:'Never remove or move an impaled object, stabilize and wrap around it, frequently monitor bleeding amount and the patient\'s consciousness/vital trend, closely monitor breath sounds and SpO2 in chest injuries.',
     followup:'All penetrating torso injuries are transported to a trauma center; removal of the object is performed only in a controlled operating room setting.',
     complications:'Hemorrhagic shock, pneumothorax/hemothorax (chest injury), organ perforation (abdominal injury).'},
    {title:'Drowning / Near-Drowning', color:'red', def:'Respiratory failure resulting from submersion in liquid causing the airway to fill with fluid/spasm; can be fatal or survivable (near-drowning).',
     symptoms:'Coughing, respiratory distress, cyanosis, altered consciousness, or cardiac arrest (in severe cases).',
     dx:'Event history, clinical assessment, SpO2 measurement, lung auscultation (rales/wheezing).',
     tx:'Remove from the water (rescuer safety first), CPR if needed (standard ratio, compressions are not performed in water), oxygen support, airway management for severe respiratory failure; ALL drowning cases are transported for hospital observation, even if asymptomatic (risk of delayed pulmonary edema).',
     nursing:'Spinal precautions if cervical injury is suspected (diving/jumping accident), assess for hypothermia and rewarm, lateral positioning to prevent aspiration from vomiting if unconscious.',
     followup:'Even apparently asymptomatic patients are transported for at least a few hours of hospital observation (risk of delayed/secondary drowning-related pulmonary edema).',
     complications:'Delayed (secondary) pulmonary edema, hypoxic brain injury, hypothermia, aspiration pneumonia.'},
    {title:'Electrical Injury', color:'red', def:'A field emergency involving cardiac, neurological, and tissue damage from electrical current exposure; effects vary with voltage and current type.',
     symptoms:'Entry-exit burn marks, cardiac arrhythmia/arrest, altered consciousness, fracture from muscle contraction (especially spinal), respiratory muscle paralysis (in severe cases).',
     dx:'Event history (voltage, contact duration), ECG (arrhythmia screening), search for entry-exit burn marks.',
     tx:'FIRST ensure rescuer safety (never touch the patient until contact with the current source is confirmed cut off), CPR/defibrillation if needed, burn care, ECG monitoring.',
     nursing:'Never approach the patient until certain the power source is disconnected, ECG/cardiac monitoring for all high-voltage exposures (delayed arrhythmia risk), screen for concomitant trauma (fall, contraction-related fracture).',
     followup:'All high-voltage exposures and patients with cardiac symptoms or ECG abnormality are transported for hospital cardiac monitoring.',
     complications:'Lethal arrhythmia (VF), deep tissue/muscle damage (may be far worse than it appears), compartment syndrome, myoglobinuria-related kidney injury.'},
    {title:'Foreign Body Airway Obstruction (Choking)', color:'red', def:'Food or small objects lodging in the airway causing partial or complete obstruction; rapidly fatal without prompt intervention.',
     symptoms:'Partial obstruction: coughing, wheezing, able to speak. Complete obstruction: unable to speak, clutching the throat (universal choking sign), cyanosis, loss of consciousness (as minutes progress).',
     dx:'Clinical observation; distinguishing whether the patient can speak/cough (partial) or makes no sound at all (complete obstruction).',
     tx:'For partial obstruction, encourage the patient\'s own coughing; do not intervene. For complete obstruction: Heimlich maneuver (abdominal thrusts) in a conscious adult, back blows plus chest thrusts in an infant; proceed to CPR if consciousness is lost (checking the mouth before each compression cycle).',
     nursing:'Guide the conscious patient calmly without causing panic, confirm the object has been expelled after the maneuver, patients with recurrent choking/cough complaints should be evaluated at the hospital for occult partial obstruction.',
     followup:'Patients where complete expulsion of the object cannot be confirmed, or who have chest pain/respiratory distress after the maneuver, are transported to the hospital.',
     complications:'Hypoxic brain injury, cardiac arrest, internal organ injury from the maneuver itself (rare).'},
    {title:'Fall from Height', color:'red', def:'High-energy trauma, potentially affecting multiple systems, resulting from a fall from a significant height (particularly >3 meters).',
     symptoms:'Variable depending on fall height and landing pattern; limb deformity, back/lower back pain, altered consciousness, respiratory distress.',
     dx:'Questioning fall height/landing surface/landing pattern (feet/back/head first), ABCDE primary assessment, full-body trauma survey.',
     tx:'Full spinal immobilization (assuming high-energy trauma), airway/breathing/circulation stabilization, hemorrhage control, pain management, rapid trauma center transport.',
     nursing:'Full immobilization and careful handling even if the patient appears asymptomatic, due to the high-energy mechanism; avoid unnecessary movement if spinal/pelvic fracture is suspected, frequent neurovascular reassessment.',
     followup:'A high-energy fall mechanism alone is a criterion for trauma center referral (even without visible injury).',
     complications:'Spinal fracture/spinal cord injury, internal hemorrhage (spleen/liver), pelvic fracture, multiple extremity fractures.'},
    {title:'Venomous Snake Bite', color:'amber', def:'A field emergency involving local tissue damage and systemic toxic effects from a venomous snake bite.',
     symptoms:'Pain, swelling, ecchymosis at the bite site; systemic findings (nausea, bleeding tendency, neurological findings - varies by snake species).',
     dx:'Bite history, identification of the snake if possible (safely, without re-approaching it), assessment of the bite site.',
     tx:'Keep the affected limb below heart level and immobilized, loosely mark the bite site and monitor swelling progression, DO NOT apply a tight bandage/tourniquet, rapid hospital transport (for antivenom).',
     nursing:'Never cut or attempt to suck out the bite site, do not apply ice, keep the patient calm and immobile (to slow venom spread), mark the border of swelling on the skin with the time to track progression.',
     followup:'All venomous snake bites are transported to the hospital for antivenom and observation; even apparently asymptomatic bites require observation.',
     complications:'Compartment syndrome, systemic coagulopathy, respiratory paralysis (in neurotoxic snake species), tissue necrosis.'},
    {title:'Frostbite and Hypothermia', color:'blue', def:'Local tissue freezing (frostbite) and/or systemic drop in body temperature (hypothermia) resulting from prolonged cold exposure.',
     symptoms:'Frostbite: whitening, hardness, numbness in the affected area. Hypothermia: shivering (mild), loss of shivering and confusion (moderate-severe), unconsciousness and bradycardia (severe).',
     dx:'Body temperature measurement (if available), clinical assessment, visual/tactile examination of the affected area.',
     tx:'Remove wet clothing, passive rewarming with dry blankets, warm (not scalding) drinks if conscious, DO NOT RUB the frostbitten area and slowly rewarm with warm water only if there is no risk of refreezing; gentle handling in severe hypothermia (can trigger cardiac arrhythmia).',
     nursing:'Avoid SUDDEN and rough movements in severely hypothermic patients (may trigger ventricular fibrillation), never rub or massage frostbitten tissue, do not begin active rewarming if there is a risk of refreezing during transport.',
     followup:'Moderate-severe hypothermia and all frostbite cases are transported for hospital evaluation.',
     complications:'Cardiac arrhythmia (especially the "afterdrop" phenomenon during rewarming), tissue loss/necrosis (frostbite), cardiac arrest (severe hypothermia).'},
    {title:'Heat Stroke', color:'red', def:'A life-threatening hyperthermia condition resulting from failure of the body\'s thermoregulatory mechanism due to excessive heat exposure.',
     symptoms:'Very high body temperature (>40°C), hot-dry or moist skin, altered consciousness/confusion, seizure (in severe cases).',
     dx:'Body temperature measurement, history of heat exposure/exertion, assessment of level of consciousness.',
     tx:'Immediate active cooling (cool water misting plus fanning, ice-water immersion if available), oxygen support, IV fluids, benzodiazepine if seizing.',
     nursing:'Continue cooling until target body temperature (~38-39°C) is reached, avoid over-cooling (which triggers shivering), closely monitor for consciousness changes and seizure.',
     followup:'Every patient diagnosed with heat stroke is transported for hospital evaluation of multi-organ damage (kidney, liver).',
     complications:'Multi-organ failure, DIC (disseminated intravascular coagulation), permanent neurological damage, rhabdomyolysis.'},
    {title:'Chemical Burn/Exposure', color:'red', def:'Tissue damage to the skin, eyes, or respiratory tract from contact with acids/bases or other caustic chemicals.',
     symptoms:'Burning sensation, redness, skin rash/ulceration at the contact site; severe pain and blurred vision with eye contact; cough/respiratory distress with inhalation.',
     dx:'Identification of the chemical (safety data sheet if available), questioning the contact site and duration.',
     tx:'Ensure rescuer safety (personal protective equipment) first; remove contaminated clothing, irrigate the affected area with COPIOUS water for at least 15-20 minutes (continuous irrigation for eye contact); DO NOT use neutralizing agents.',
     nursing:'Irrigation must be continuous and of sufficient duration, contaminated clothing must be safely removed, remove contact lenses if present with eye exposure, call a specialized team if CBRN exposure is suspected.',
     followup:'All chemical eye/inhalation exposures and moderate-severe skin burns are transported to the hospital.',
     complications:'Permanent vision loss (eye contact), deep tissue necrosis, airway edema/chemical pneumonitis (inhalation).'},
    {title:'Extremity Fracture/Dislocation (Field)', color:'amber', def:'Loss of bone integrity (fracture) or separation of joint surfaces (dislocation) resulting from trauma.',
     symptoms:'Pain, swelling, deformity, limited range of motion; visible bone/wound in an open fracture.',
     dx:'Visual/palpation assessment, distal neurovascular exam (pulse, sensation, movement), injury mechanism.',
     tx:'Splint the fracture in the position found (without attempting to correct the deformity), cover an open fracture wound with a sterile dressing, manage pain, check distal neurovascular status before/after splinting.',
     nursing:'Always check and document pulse-sensation-movement (neurovascular status) before and after splinting, NEVER attempt to push exposed bone back in for an open fracture, do not splint too tightly to allow for swelling.',
     followup:'All suspected fractures/dislocations are transported to the hospital for imaging and orthopedic evaluation.',
     complications:'Neurovascular injury (from tight splinting or the fracture itself), fat embolism (long bone fractures), compartment syndrome.'},
    {title:'Head Injury (Field)', color:'red', def:'Injury to the head from a blow, ranging in spectrum from mild concussion to severe traumatic brain injury.',
     symptoms:'Headache, nausea-vomiting, confusion/loss of consciousness, memory gaps (amnesia), pupil asymmetry (severe cases), clear fluid from the ear/nose (suspected CSF leak).',
     dx:'Glasgow Coma Scale (GCS) assessment, injury mechanism, pupil check, assessment for concomitant cervical injury.',
     tx:'Cervical spine immobilization (for high-energy mechanisms), airway/breathing support, advanced airway preparation if GCS is low, head-elevated position (if possible and no spinal injury), close neurological monitoring.',
     nursing:'Periodically reassess and document GCS (a worsening trend is critical information), check pupils, be prepared for sudden neurological change during transport, avoid confusing alcohol/substance effects with injury findings.',
     followup:'All head injuries with GCS<15, repeated vomiting, history of loss of consciousness, or a high-energy mechanism are transported to the hospital for CT imaging.',
     complications:'Epidural/subdural hematoma, increased intracranial pressure, herniation, permanent neurological deficit.'},
    {title:'Traumatic Amputation', color:'red', def:'Complete or partial separation of a limb or body part from the body as a result of trauma.',
     symptoms:'Visibly detached body part, active bleeding, signs of shock.',
     dx:'Visual assessment; evaluation of bleeding amount and shock signs.',
     tx:'Hemorrhage control with direct pressure (tourniquet if uncontrolled), cover the stump with a sterile dressing, locate the amputated part and store it properly (wrapped in moist sterile gauze, placed in a cooler/ice-water container WITHOUT direct contact with ice).',
     nursing:'Never let the amputated part come into direct contact with ice/dry ice (freezing damage reduces replantation chances), transport the patient and the amputated part together, rapidly, to a facility capable of replantation; shock management is the priority.',
     followup:'All amputations with replantation potential are urgently transported, along with the amputated part, to an appropriate surgical center.',
     complications:'Hemorrhagic shock, loss of replantation viability (delay/improper storage), infection.'}
  ],
  drugs:[
    drug({title:'Epinephrine (EMS - Arrest/Anaphylaxis)', color:'red', brand:'Epinephrine Ampule', generic:'Epinephrine', altBrands:'-', group:'Alpha/beta adrenergic agonist',
     mechanism:'Alpha-1 effect causes vasoconstriction, beta-1 increases cardiac output, beta-2 causes bronchodilation.',
     indication:'Cardiac arrest (ACLS protocol), anaphylaxis, severe bronchospasm.',
     contraindication:'No absolute contraindication in life-threatening situations like arrest and anaphylaxis.',
     sideEffects:'Tachycardia, hypertension, palpitations, tremor.',
     dose:'Arrest: 1mg IV/IO every 3-5 minutes; Anaphylaxis: 0.3-0.5mg IM (anterolateral thigh), repeat in 5-15 min if needed.',
     prep:'Ready ampule or auto-injector.', dilution:'No dilution needed for arrest (1mg/10ml IV form used).',
     infusionTime:'Rapid IV/IO bolus (arrest); IM injection (anaphylaxis).', route:'IV, IO, IM',
     renal:'No dose adjustment needed.', hepatic:'No dose adjustment needed.',
     pregnancy:'Used in life-threatening situations', lactation:'Used in emergencies.',
     monitoring:'Heart rhythm/rate, blood pressure.', storage:'Store at room temperature, protected from light.',
     interactions:'Beta-blockers may reduce effect.', highRisk:true, lasa:false}),
    drug({title:'Amiodarone (EMS - Arrest)', color:'red', brand:'Cordarone', generic:'Amiodarone HCl', altBrands:'-', group:'Class III antiarrhythmic',
     mechanism:'Prolongs cardiac repolarization, stabilizing shockable rhythms (VF/pulseless VT).',

/* ============ STORAGE ============ */
async function loadPersisted(){
  try{ const f = await window.storage.get('favorites'); state.favorites = f ? JSON.parse(f.value) : {}; }catch(e){ state.favorites = {}; }
  try{ const n = await window.storage.get('notes'); state.notes = n ? JSON.parse(n.value) : []; }catch(e){ state.notes = []; }
  try{ const t = await window.storage.get('theme'); state.dark = t ? t.value === 'dark' : false; }catch(e){ state.dark = false; }
  try{ const s = await window.storage.get('shift_schedule'); state.shifts = s ? JSON.parse(s.value) : {}; }catch(e){ state.shifts = {}; }
  try{ const mn = await window.storage.get('med_notes'); state.medNotes = mn ? JSON.parse(mn.value) : {}; }catch(e){ state.medNotes = {}; }
  try{ const ns = await window.storage.get('notified_shifts'); state.notifiedShifts = ns ? JSON.parse(ns.value) : {}; }catch(e){ state.notifiedShifts = {}; }
  render();
  checkUpcomingShifts();
  setInterval(checkUpcomingShifts, 15*60*1000);
}
async function saveFavorites(){ try{ await window.storage.set('favorites', JSON.stringify(state.favorites)); }catch(e){} }

async function saveTheme(){ try{ await window.storage.set('theme', state.dark ? 'dark' : 'light'); }catch(e){} }

function requestShiftNotifPermission(){
  if(typeof Notification === 'undefined'){ alert('This browser does not support notifications.'); return; }
  Notification.requestPermission().then(perm=>{ render(); });
}
function getUpcomingShifts(){
  const now = new Date();
  const upcoming = [];
  Object.keys(state.shifts).forEach(dateStr=>{
    const code = state.shifts[dateStr];
    const hour = SHIFT_START_HOUR[code];
    if(hour===undefined) return;
    const start = new Date(dateStr+'T'+String(hour).padStart(2,'0')+':00:00');
    const diffH = (start - now) / 3600000;
    if(diffH > 0 && diffH <= 12){
      const shiftDef = SHIFT_TYPES.find(s=>s.code===code);
      upcoming.push({dateStr, code, label: shiftDef?shiftDef.label:code, hoursLeft: diffH});
    }
  });
  return upcoming.sort((a,b)=>a.hoursLeft-b.hoursLeft);
}
function checkUpcomingShifts(){
  const upcoming = getUpcomingShifts();
  let changed = false;
  upcoming.forEach(u=>{
    if(!state.notifiedShifts[u.dateStr]){
      if(typeof Notification !== 'undefined' && Notification.permission === 'granted'){
        try{ new Notification('Upcoming Shift', {body: `${formatDateLabelEN(u.dateStr)} - your ${u.label} shift starts in ${Math.round(u.hoursLeft)} hours.`}); }catch(e){}
      }
      state.notifiedShifts[u.dateStr] = true;
      changed = true;
    }
  });
  if(changed) saveNotifiedShifts();
  if(state.view==='home' || state.view==='schedule') render();
}

function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }
function firstWeekdayMon(y,m){ let d = new Date(y,m,1).getDay(); return (d+6)%7; }
function formatDateLabelEN(dateStr){ const [y,m,d]=dateStr.split('-').map(Number); return `${MONTH_NAMES_EN[m-1]} ${d}, ${y}`; }
function changeMonth(delta){
  state.scheduleMonth += delta;
  if(state.scheduleMonth<0){ state.scheduleMonth=11; state.scheduleYear--; }

/* ============ SEARCH INDEX ============ */
function buildSearchIndex(){
  const idx = [];
  Object.entries(CLINIC_DATA).forEach(([cid, c])=>{
    c.diseases.forEach((d,i)=> idx.push({title:d.title, sub:c.name+' · Disease', cat:'Disease', color:d.color, go:()=>openClinic(cid,'diseases',i), text: d.title+' '+d.def+' '+d.symptoms}));
    c.drugs.forEach((d,i)=> idx.push({title:d.title, sub:c.name+' · Drug ('+d.brand+')', cat:'Drug', color:d.color, go:()=>openClinic(cid,'drugs',i), text: d.title+' '+d.brand+' '+d.generic+' '+d.group}));
    c.labs.forEach((l)=> idx.push({title:l.name, sub:c.name+' · Lab', cat:'Lab', color:'blue', go:()=>openClinic(cid,'labs',null), text:l.name}));
    (c.abbreviations||[]).forEach(a=> idx.push({title:a.a, sub:a.full, cat:'Abbreviation', color:'amber', go:()=>{state.view='abbrev'; render();}, text:a.a+' '+a.full}));
  });
  ABBREV_GLOBAL.forEach(a=> idx.push({title:a.a, sub:a.full, cat:'Abbreviation', color:'amber', go:()=>{state.view='abbrev'; render();}, text:a.a+' '+a.full}));
  FLUIDS_GLOBAL.forEach(f=> idx.push({title:f.name, sub:'IV Fluid · '+f.indication.slice(0,40), cat:'IV Fluid', color:'green', go:()=>{state.view='fluids'; render();}, text:f.name+' '+f.composition+' '+f.indication}));
  INFUSIONS_GLOBAL.forEach(f=> idx.push({title:f.name, sub:'Critical Infusion · '+f.doseRange, cat:'Infusion', color:'red', go:()=>{state.view='fluids'; render();}, text:f.name+' '+f.standardPrep+' '+f.doseRange}));
  return idx;
}
let SEARCH_INDEX = [];

function runSearch(q){
  if(!q || q.trim().length<1) return [];
  const nq = norm(q);
  return SEARCH_INDEX.filter(it => norm(it.text).includes(nq)).slice(0,20);
}

}

function calcBMI(){
  const w=parseFloat(document.getElementById('bmi_w').value), h=parseFloat(document.getElementById('bmi_h').value)/100;
  const el=document.getElementById('bmi_res');
  if(!w||!h){el.textContent='Enter values to see the result.';return;}
  const bmi=(w/(h*h));
  let cat = bmi<18.5?'Underweight': bmi<25?'Normal': bmi<30?'Overweight':'Obese';
  el.textContent = `BMI: ${bmi.toFixed(1)} kg/m² — ${cat}`;
}
function calcDrip(){
  const v=parseFloat(document.getElementById('dr_v').value), t=parseFloat(document.getElementById('dr_t').value), f=parseFloat(document.getElementById('dr_f').value);
  const el=document.getElementById('dr_res');
  if(!v||!t||!f){el.textContent='Enter values to see the result.';return;}
  const gtt = (v*f)/(t*60);
  el.textContent = `${gtt.toFixed(0)} drops/minute (≈ ${(v/t).toFixed(1)} ml/hour)`;
}
function calcInfusion(){
  const w=parseFloat(document.getElementById('inf_w').value), d=parseFloat(document.getElementById('inf_d').value), c=parseFloat(document.getElementById('inf_c').value), vol=parseFloat(document.getElementById('inf_vol').value);
  const el=document.getElementById('inf_res');
  if(!w||!d||!c||!vol){el.textContent='Example: for norepinephrine 4 mg / 50 ml saline, enter "Vial: 4", "Volume: 50".';return;}
  const concMcgPerMl = (c*1000)/vol;
  const mlPerHour = (d*w*60)/concMcgPerMl;
  el.textContent = `${mlPerHour.toFixed(2)} ml/hour (concentration: ${concMcgPerMl.toFixed(1)} mcg/ml)`;
}
function calcGFR(){
  const cr=parseFloat(document.getElementById('gfr_cr').value), age=parseFloat(document.getElementById('gfr_age').value), sex=document.getElementById('gfr_sex').value;
  const el=document.getElementById('gfr_res');
  if(!cr||!age){el.textContent='Enter values to see the result.';return;}
  const k = sex==='f'?0.7:0.9; const a = sex==='f'?-0.241:-0.302;
  const minCr = Math.min(cr/k,1), maxCr = Math.max(cr/k,1);
  let gfr = 142 * Math.pow(minCr,a) * Math.pow(maxCr,-1.200) * Math.pow(0.9938, age);
  if(sex==='f') gfr *= 1.012;
  let stage = gfr>=90?'Stage 1 (Normal)': gfr>=60?'Stage 2 (Mildly decreased)': gfr>=30?'Stage 3 (Moderately decreased)': gfr>=15?'Stage 4 (Severely decreased)':'Stage 5 (Kidney failure)';
  el.textContent = `Estimated eGFR: ${gfr.toFixed(0)} ml/min/1.73m² — ${stage}`;
}
function calcFluid(){
  const w=parseFloat(document.getElementById('fluid_w').value);
  const el=document.getElementById('fluid_res');
  if(!w){el.textContent='Enter weight to see the result.';return;}
  let ml;
  if(w<=10) ml = w*100;
  else if(w<=20) ml = 1000 + (w-10)*50;
  else ml = 1500 + (w-20)*20;
  el.textContent = `Daily fluid requirement: ${ml.toFixed(0)} ml/day (≈ ${(ml/24).toFixed(1)} ml/hour)`;
}

function togglePickMed(name){

  render();
}
function findInteraction(g1, g2){
  const n1 = normMed(g1), n2 = normMed(g2);
  return INTERACTIONS_DB.find(x=> (normMed(x.a)===n1 && normMed(x.b)===n2) || (normMed(x.a)===n2 && normMed(x.b)===n1) || n1.includes(normMed(x.a))&&n2.includes(normMed(x.b)) || n1.includes(normMed(x.b))&&n2.includes(normMed(x.a)));
}
function checkInteractions(){
  const picked = state.interactionPicked;
  const results = [];
  for(let i=0;i<picked.length;i++){
    for(let j=i+1;j<picked.length;j++){
      const medA = MEDICATION_DB.find(m=>m.n===picked[i]);
      const medB = MEDICATION_DB.find(m=>m.n===picked[j]);
      if(!medA||!medB) continue;
      const found = findInteraction(medA.g, medB.g);
      results.push({a:picked[i], b:picked[j], found});
    }
  }
  state.interactionResult = results;
  render();
}

/* ============ BLOOD GAS ANALYSIS TOOL ============ */
function calcABG(){
  const ph = parseFloat(document.getElementById('abg_ph').value);
  const paco2 = parseFloat(document.getElementById('abg_paco2').value);
  const hco3 = parseFloat(document.getElementById('abg_hco3').value);
  const pao2 = parseFloat(document.getElementById('abg_pao2').value);
  const na = parseFloat(document.getElementById('abg_na').value);
  const cl = parseFloat(document.getElementById('abg_cl').value);
  const fio2 = parseFloat(document.getElementById('abg_fio2').value);
  const el = document.getElementById('abg_result');
  if(isNaN(ph) || isNaN(paco2) || isNaN(hco3)){
    el.innerHTML = '<div class="abg-result"><div class="abg-line">Enter at least pH, PaCO2, and HCO3 to analyze.</div></div>';
    return;
  }
  const phLow = ph < 7.35, phHigh = ph > 7.45;
  const co2Low = paco2 < 35, co2High = paco2 > 45;
  const hco3Low = hco3 < 22, hco3High = hco3 > 26;
  let primary = '';
  let compensation = '';
  if(!phLow && !phHigh){
    if(co2High && hco3High) primary = 'Fully compensated acid-base balance (pH normal, both PaCO2 and HCO3 elevated — may indicate chronic respiratory acidosis with metabolic compensation).';
    else if(co2Low && hco3Low) primary = 'Fully compensated acid-base balance (pH normal, both PaCO2 and HCO3 low — may indicate chronic respiratory alkalosis with metabolic compensation).';
    else primary = 'pH is within normal range; no significant acid-base disturbance detected.';
  } else if(phLow){
    if(co2High && !hco3Low){ primary = 'Respiratory Acidosis (Primary)'; compensation = hco3High? 'Partially compensated (metabolic compensation underway)' : 'Not compensated (acute)'; }
    else if(hco3Low && !co2High){ primary = 'Metabolic Acidosis (Primary)'; compensation = co2Low? 'Partially compensated (respiratory compensation present)' : 'Not compensated (acute)'; }
    else if(co2High && hco3Low){ primary = 'Mixed Acidosis (Respiratory + Metabolic)'; compensation = 'Both components trend toward acidosis; compensation is inadequate.'; }
    else { primary = 'Acidosis (low pH), but PaCO2/HCO3 do not fully match the expected pattern — evaluate together with clinical context.'; }
  } else if(phHigh){
    if(co2Low && !hco3High){ primary = 'Respiratory Alkalosis (Primary)'; compensation = hco3Low? 'Partially compensated' : 'Not compensated (acute)'; }
    else if(hco3High && !co2Low){ primary = 'Metabolic Alkalosis (Primary)'; compensation = co2High? 'Partially compensated' : 'Not compensated (acute)'; }
    else if(co2Low && hco3High){ primary = 'Mixed Alkalosis (Respiratory + Metabolic)'; compensation = 'Both components trend toward alkalosis.'; }
    else { primary = 'Alkalosis (high pH), but PaCO2/HCO3 do not fully match the expected pattern — evaluate together with clinical context.'; }
  }
  let agLine = '';
  if(!isNaN(na) && !isNaN(cl)){
    const ag = na - (cl + hco3);
    agLine = `<div class="abg-line"><b>Anion Gap:</b> ${ag.toFixed(1)} mEq/L (normal 8-12) — ${ag>12?'Suggests high anion gap metabolic acidosis (lactic acidosis, DKA, uremia, toxin).':'Within normal range.'}</div>`;
  }
  let oxyLine = '';
  if(!isNaN(pao2)){
    let oxyCat = pao2<60?'Severe hypoxemia':pao2<80?'Mild-moderate hypoxemia':'Normal oxygenation';
    oxyLine = `<div class="abg-line"><b>Oxygenation:</b> PaO2 ${pao2} mmHg — ${oxyCat}.</div>`;
    if(!isNaN(fio2) && fio2>0){
      const pf = pao2 / (fio2/100);
      let ards = pf<100?'Severe ARDS':pf<200?'Moderate ARDS':pf<300?'Mild ARDS':'No ARDS criteria met';
      oxyLine += `<div class="abg-line"><b>P/F Ratio:</b> ${pf.toFixed(0)} — ${ards}.</div>`;
    }
  }
  el.innerHTML = `<div class="abg-result">
    <div class="abg-main">${primary}</div>
    ${compensation? `<div class="abg-line"><b>Compensation:</b> ${compensation}</div>` : ''}
    <div class="abg-line"><b>pH:</b> ${ph} (normal 7.35-7.45)</div>
    <div class="abg-line"><b>PaCO2:</b> ${paco2} mmHg (normal 35-45)</div>
    <div class="abg-line"><b>HCO3:</b> ${hco3} mEq/L (normal 22-26)</div>
    ${agLine}
    ${oxyLine}
  </div>`;
}
function viewABG(){
  return `
  <div class="backbar"><button class="icon-btn" onclick="goto('home')">←</button><h1>Blood Gas Analysis Tool</h1></div>
  <div class="calc-card">
    <div class="calc-title">Enter Blood Gas Values</div>
    <div class="calc-row"><label>pH</label><input type="number" step="0.01" id="abg_ph" oninput="calcABG()"/></div>
    <div class="calc-row"><label>PaCO2 (mmHg)</label><input type="number" id="abg_paco2" oninput="calcABG()"/></div>
    <div class="calc-row"><label>HCO3 (mEq/L)</label><input type="number" id="abg_hco3" oninput="calcABG()"/></div>
    <div class="calc-row"><label>PaO2 (mmHg) - optional</label><input type="number" id="abg_pao2" oninput="calcABG()"/></div>
    <div class="calc-row"><label>FiO2 (%) - optional</label><input type="number" id="abg_fio2" oninput="calcABG()"/></div>
    <div class="calc-row"><label>Na (mEq/L) - optional</label><input type="number" id="abg_na" oninput="calcABG()"/></div>
    <div class="calc-row"><label>Cl (mEq/L) - optional</label><input type="number" id="abg_cl" oninput="calcABG()"/></div>
    <div id="abg_result"><div class="abg-result"><div class="abg-line">Enter at least pH, PaCO2, and HCO3 to analyze.</div></div></div>
  </div>
  <div class="section-title">Reference Ranges</div>
  <div class="card">
    <div class="list-row"><span class="name">pH</span><span class="val">7.35-7.45</span></div>
    <div class="list-row"><span class="name">PaCO2</span><span class="val">35-45 mmHg</span></div>
    <div class="list-row"><span class="name">HCO3</span><span class="val">22-26 mEq/L</span></div>
    <div class="list-row"><span class="name">PaO2</span><span class="val">80-100 mmHg</span></div>
    <div class="list-row"><span class="name">Anion Gap</span><span class="val">8-12 mEq/L</span></div>
  </div>
  <div class="pdf-note">This tool is an educational/support calculator; clinical decisions should be based on the patient's full presentation and physician judgment.</div>
  `;
}

function viewFavorites(){
  const keys = Object.keys(state.favorites);
  if(!keys.length) return `<div class="backbar"><h1>Favorites</h1></div><div class="empty-state"><div class="em">⭐</div>You haven't added any favorites yet.<br/>Tap the star on a drug or disease card.</div>`;
  return `<div class="backbar"><h1>Favorites</h1></div>` + keys.map(k=>{
    const f = state.favorites[k];
    return `<div class="card"><div class="card-head" onclick="goFav('${k}')"><div><div class="card-title">${f.title}</div><div class="card-sub">${f.category}</div></div>
      <button class="fav-btn active" onclick="event.stopPropagation();toggleFav('${k}')">★</button></div></div>`;
  }).join('');
}
function goFav(key){
  const [type, cid, idxStr] = key.split(':');
  if(type==='disease') openClinic(cid,'diseases',parseInt(idxStr));
  else if(type==='drug') openClinic(cid,'drugs',parseInt(idxStr));
  else if(type==='med'){ state.view='medguide'; state.medSearch=''; state.medIndex=parseInt(cid); render(); }
}

function viewNotes(){
  return `<div class="backbar"><h1>My Notes</h1></div>
  <textarea class="note-input" id="newNote" placeholder="Add a new note (e.g. shift reminder)..."></textarea>
  <div style="margin-top:8px;"><button class="btn" onclick="addNote()">Save Note</button></div>
  <div class="section-title" style="margin-top:18px;">Saved Notes</div>
  ${state.notes.length? state.notes.slice().reverse().map((n)=>{
      const realIdx = state.notes.indexOf(n);
      return `<div class="note-item"><div>${esc(n.text)}</div><div class="meta"><span>${new Date(n.ts).toLocaleString('en-US')}</span><span class="del-link" onclick="deleteNote(${realIdx})">Delete</span></div></div>`;
    }).join('') : `<div class="empty-state">No notes added yet.</div>`}
  `;
}
function addNote(){
  const t = document.getElementById('newNote').value.trim();
  if(!t) return;
  state.notes.push({text:t, ts:Date.now()});
  saveNotes(); render();
}
function deleteNote(i){ state.notes.splice(i,1); saveNotes(); render(); }

/* ============ MAIN RENDER ============ */
function render(){
  document.body.setAttribute('data-theme', state.dark?'dark':'light');
  let view = '';
  if(state.view==='home') view = viewHome();
  else if(state.view==='clinic') view = viewClinic();
  else if(state.view==='abbrev') view = viewAbbrev();
  else if(state.view==='calc') view = viewCalc();
  else if(state.view==='vitals') view = viewVitals();
  else if(state.view==='fluids') view = viewFluids();
  else if(state.view==='schedule') view = viewSchedule();
  else if(state.view==='medguide') view = viewMedGuide();
  else if(state.view==='interactions') view = viewInteractions();
  else if(state.view==='ecg') view = viewECG();
  else if(state.view==='abg') view = viewABG();
  else if(state.view==='favorites') view = viewFavorites();
  else if(state.view==='notes') view = viewNotes();
  else view = viewHome();

  document.getElementById('app').innerHTML = `
    ${renderTopbar()}
    <div class="content">${view}</div>
    ${renderBottomNav()}
  `;
}

/* ============ INIT ============ */
SEARCH_INDEX = buildSearchIndex();
loadPersisted();
</script>

<!-- ============================================================
     MOBILE BRIDGE SCRIPT (Capacitor Android integration)
     This script does NOT modify the application code above in any
     way. It only provides additional/supplementary functionality:
       1) window.storage polyfill (using localStorage on Android WebView)
       2) Hardware back button handling (in-app navigation)
       3) StatusBar/theme synchronization (dark mode)
       4) Splash screen dismissal
       5) Native local notifications for shift reminders
     When run in a regular browser (without Capacitor), this script
     is completely harmless and silently disables itself.
     ============================================================ -->
<script>
(function(){
  'use strict';

  /* ---------- 1) FOCUS PRESERVATION — render() WRAPPER ----------
     The app fully rebuilds #app's innerHTML on every keystroke (part
     of the existing architecture). This destroys and recreates the
     focused input element, which was causing the native keyboard to
     dismiss after every single character typed. This wrapper records
     which input is focused (id, value, cursor position) right before
     render() runs, then restores focus and cursor position to the
     matching element right after. The render() function itself is
     never modified — it is only wrapped from the outside. */
  if (typeof render === 'function') {
    var __originalRender = render;
    render = function(){
      var active = document.activeElement;
      var focusInfo = null;
      if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) {
        focusInfo = {
          id: active.id || null,
          tag: active.tagName.toLowerCase(),
          cls: active.className || '',
          placeholder: active.placeholder || '',
          selStart: active.selectionStart,
          selEnd: active.selectionEnd
        };
      }
      __originalRender();
      if (focusInfo) {
        var target = null;
        if (focusInfo.id) {
          target = document.getElementById(focusInfo.id);
        }
        if (!target) {
          var candidates = document.getElementsByTagName(focusInfo.tag);
          for (var i=0; i<candidates.length; i++){
            var c = candidates[i];
            if ((c.className||'') === focusInfo.cls && (c.placeholder||'') === focusInfo.placeholder) { target = c; break; }
          }
        }
        if (target) {
          try {
            target.focus();
            if (typeof focusInfo.selStart === 'number') {
              target.setSelectionRange(focusInfo.selStart, focusInfo.selEnd);
            }
          } catch(e){}
        }
      }
    };
  }

  /* ---------- 2) NATIVE NOTIFICATION SHIM (window.Notification) ----------
     The standard Web Notification API does not exist in an Android
     WebView, so the app's "Enable Notifications" button was showing a
     "not supported by this browser" error. This shim provides the SAME
     interface as the browser Notification API (permission,
     requestPermission(), constructor), so the app's existing
     notification logic works transparently through Capacitor's
     LocalNotifications plugin — without changing any app code. */
  if (typeof window.Notification === 'undefined' && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications) {
    var LN = window.Capacitor.Plugins.LocalNotifications;
    window.Notification = function(title, options){
      options = options || {};
      try {
        LN.schedule({ notifications: [{
          id: Math.floor(Math.random()*1000000),
          title: title,
          body: options.body || '',
          schedule: { at: new Date(Date.now() + 500) }
        }] });
      } catch(e){}
    };
    window.Notification.permission = 'default';
    window.Notification.requestPermission = function(){
      return LN.requestPermissions().then(function(result){
        window.Notification.permission = (result && result.display === 'granted') ? 'granted' : 'denied';
        return window.Notification.permission;
      }).catch(function(){
        window.Notification.permission = 'denied';
        return 'denied';
      });
    };
  }

  /* ---------- Capacitor detection ---------- */
  var CAP = window.Capacitor;
  if (!CAP || !CAP.isNativePlatform || !CAP.isNativePlatform()) {
    return; // Running in a regular browser: skip the native integrations below.
  }
  var Plugins = CAP.Plugins || {};

  /* ---------- 3) HARDWARE BACK BUTTON ----------
     Since the app is a single-page (SPA) application, there is no
     browser history. On back button press: if not on the home screen,
     navigate to home (using the app's existing global goto() function);
     if already on home, exit the app. */
  if (Plugins.App && Plugins.App.addListener) {
    Plugins.App.addListener('backButton', function(){
      try {
        if (typeof state !== 'undefined' && state && state.view && state.view !== 'home') {
          if (typeof goto === 'function') { goto('home'); return; }
        }
        Plugins.App.exitApp();
      } catch(e) {
        Plugins.App.exitApp();
      }
    });
  }

  /* ---------- 4) STATUSBAR / THEME SYNCHRONIZATION ----------
     The app manages dark mode via document.body[data-theme]. This
     observer watches that attribute and updates the status bar
     accordingly, without modifying the app's own code. */
  function syncStatusBar(){
    if (!Plugins.StatusBar) return;
    var isDark = document.body.getAttribute('data-theme') === 'dark';
    try {
      Plugins.StatusBar.setBackgroundColor({ color: isDark ? '#101A2E' : '#FFFFFF' });
      Plugins.StatusBar.setStyle({ style: isDark ? 'DARK' : 'LIGHT' });
    } catch(e){}
  }
  syncStatusBar();
  try {
    new MutationObserver(syncStatusBar).observe(document.body, { attributes:true, attributeFilter:['data-theme'] });
  } catch(e){}

  /* ---------- 4b) iOS SAFE AREA (NOTCH / DYNAMIC ISLAND) EXTRA SAFEGUARD ----------
     The ios.contentInset:"automatic" setting in capacitor.config.json already
     shifts the WKWebView's content to respect the safe area. As an additional
     safeguard, we also inject safe-area-inset-top padding for the sticky top
     bar — via a separate <style> tag, without touching existing CSS. This is
     applied only on iOS, only in the native environment. */
  if (CAP.getPlatform && CAP.getPlatform() === 'ios') {
    try {
      var iosSafeAreaStyle = document.createElement('style');
      iosSafeAreaStyle.textContent = '.topbar{padding-top:calc(10px + env(safe-area-inset-top)) !important;}';
      document.head.appendChild(iosSafeAreaStyle);
    } catch(e){}
  }

  /* ---------- 5) SPLASH SCREEN DISMISSAL ---------- */
  if (Plugins.SplashScreen && Plugins.SplashScreen.hide) {
    setTimeout(function(){ try{ Plugins.SplashScreen.hide(); }catch(e){} }, 300);
  }

  /* ---------- 6) SHIFT REMINDERS (Native Local Notifications) ----------
     In the web version, notifications only worked while the browser
     tab was open. In the native environment, the LocalNotifications
     plugin allows notifications to be delivered even while the app is
     closed. This function reads the app's own state.shifts /
     SHIFT_START_HOUR global data (without touching existing code) and
     schedules a local notification 12 hours before each shift starts. */
  function scheduleShiftNotifications(){
    if (!Plugins.LocalNotifications) return;
    if (typeof state === 'undefined' || !state.shifts) return;
    if (typeof SHIFT_START_HOUR === 'undefined') return;

    Plugins.LocalNotifications.requestPermissions().then(function(){
      Plugins.LocalNotifications.getPending().then(function(pending){
        var pendingIds = (pending && pending.notifications || []).map(function(n){ return n.id; });
        return Plugins.LocalNotifications.cancel({ notifications: pendingIds.map(function(id){ return {id:id}; }) })
          .catch(function(){})
          .then(function(){ return pending; });
      }).then(function(){
        var toSchedule = [];
        var now = Date.now();
        Object.keys(state.shifts).forEach(function(dateStr, idx){
          var code = state.shifts[dateStr];
          var hour = SHIFT_START_HOUR[code];
          if (hour === undefined) return;
          var start = new Date(dateStr + 'T' + String(hour).padStart(2,'0') + ':00:00');
          var notifyAt = new Date(start.getTime() - 12*3600*1000);
          if (notifyAt.getTime() > now) {
            var label = (typeof SHIFT_TYPES !== 'undefined' && SHIFT_TYPES.find(function(s){return s.code===code;}) || {}).label || code;
            toSchedule.push({
              id: idx + 1,
              title: 'Upcoming Shift',
              body: (typeof formatDateLabelEN === 'function' ? formatDateLabelEN(dateStr) : dateStr) + ' - your ' + label + ' shift starts in 12 hours.',
              schedule: { at: notifyAt }
            });
          }
        });
        if (toSchedule.length) {
          Plugins.LocalNotifications.schedule({ notifications: toSchedule }).catch(function(){});
        }
      });
    }).catch(function(){});
  }
  // Reschedule shift notifications on initial launch and whenever the app comes to the foreground
  setTimeout(scheduleShiftNotifications, 1500);
  if (Plugins.App && Plugins.App.addListener) {
    Plugins.App.addListener('appStateChange', function(st){
      if (st && st.isActive) setTimeout(scheduleShiftNotifications, 800);
    });
  }
})();
</script>
